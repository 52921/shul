<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUL - Your Vision AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* General Styles - Dark Theme with Cyan Accents */
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --text-color: #e0e0e0;
            --accent-cyan: #0ff; 
            --accent-cyan-dark: #0cc;
            --border-color: #3e2060;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(90deg, var(--bg-light) 0%, #000000 100%);
            color: var(--accent-cyan);
            padding: 18px 25px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            box-shadow: 0 4px 15px var(--shadow-color);
            z-index: 10;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan-dark) var(--bg-dark);
        }

        #chat-window::-webkit-scrollbar { width: 8px; }
        #chat-window::-webkit-scrollbar-thumb { background-color: var(--accent-cyan-dark); border-radius: 20px; }

        .message-wrapper { display: flex; animation: fadeIn 0.5s ease-out; }
        .message-wrapper.user { justify-content: flex-end; }
        .message-wrapper.ai { justify-content: flex-start; }

        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: relative;
        }

        .user .message {
            background-color: var(--accent-cyan);
            color: var(--bg-dark);
            border-bottom-right-radius: 5px;
        }

        .ai .message {
            background-color: var(--bg-light);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 5px;
        }

        .message-img-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
        }

        pre {
            background-color: #2b2b3e;
            color: var(--accent-cyan);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            position: relative;
            margin-top: 10px;
        }

        .copy-code-button, .copy-prompt-button {
            background: rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .controls {
            background: var(--bg-light);
            padding: 15px 25px;
            border-top: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #image-preview-container {
            display: none;
            padding: 10px;
            border: 1px dashed var(--accent-cyan-dark);
            border-radius: 8px;
            background-color: var(--bg-dark);
            position: relative;
        }

        #temp-preview { max-width: 150px; border-radius: 5px; }

        .input-row { display: flex; gap: 10px; align-items: center; }

        input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            background-color: var(--bg-dark);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent-cyan); }

        .file-label, button {
            background-color: var(--accent-cyan);
            color: var(--bg-dark);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }

        .typing-indicator { display: flex; gap: 5px; padding: 15px; background: var(--bg-light); border-radius: 20px; width: fit-content; }
        .typing-indicator span { width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <header>SHUL (Vision AI)</header>

    <div id="chat-window">
        <div class="message-wrapper ai">
            <div class="message">Namaste! Main SHUL hoon, aapka Vision AI. Photo upload karein ya mujhse koi bhi sawal poochein.</div>
        </div>
    </div>

    <div class="controls">
        <div id="image-preview-container">
            <img id="temp-preview">
            <button onclick="clearImagePreview()" style="padding: 2px 8px; margin-left: 10px;">X</button>
        </div>
        <div class="input-row">
            <label class="file-label">📷 Photo <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage()"></label>
            <input type="text" id="userInput" placeholder="Yahan apna sawal likhein..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Bhejein</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let base64Image = "";
        const chatWindow = document.getElementById("chat-window");

        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

        function previewImage() {
            const file = document.getElementById('imageInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('temp-preview').src = base64Image;
                    document.getElementById('image-preview-container').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImagePreview() {
            base64Image = "";
            document.getElementById('imageInput').value = '';
            document.getElementById('image-preview-container').style.display = 'none';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        }

        async function sendMessage() {
            const textInput = document.getElementById("userInput");
            const userText = textInput.value.trim();
            if (!userText && !base64Image) return;

            let safeText = userText.replace(/'/g, "\\'");
            let userMsgHtml = `<div class="message-wrapper user"><div class="message">
                ${userText ? `<span>${userText}</span>` : ''}
                ${base64Image ? `<img src="${base64Image}" class="message-img-preview">` : ''}
                ${userText ? `<br><button class="copy-prompt-button" onclick="copyToClipboard('${safeText}')">Copy</button>` : ''}
            </div></div>`;
            
            chatWindow.innerHTML += userMsgHtml;
            const currentImg = base64Image;
            textInput.value = "";
            clearImagePreview();
            scrollToBottom();

            const tid = "typing-" + Date.now();
            chatWindow.innerHTML += `<div class="message-wrapper ai" id="${tid}"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            scrollToBottom();

            try {
                const payload = {
                    model: "llama-3.2-11b-vision-preview",
                    messages: [{
                        role: "user",
                        content: [
                            { type: "text", text: userText || "Describe this image." },
                            ...(currentImg ? [{ type: "image_url", image_url: { url: currentImg } }] : [])
                        ]
                    }]
                };

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                document.getElementById(tid).remove();

                if (data.choices && data.choices[0]) {
                    let aiMsg = data.choices[0].message.content;
                    aiMsg = aiMsg.replace(/```(.*?)\n([\s\S]*?)```/g, (m, lang, code) => {
                        const id = "code-" + Math.random().toString(36).substr(2, 5);
                        return `<pre><code id="${id}">${code.replace(/</g, "&lt;")}</code><br><button class="copy-code-button" onclick="copyToClipboard(document.getElementById('${id}').innerText)">Copy Code</button></pre>`;
                    });
                    chatWindow.innerHTML += `<div class="message-wrapper ai"><div class="message">${aiMsg}</div></div>`;
                }
            } catch (e) {
                document.getElementById(tid).remove();
                chatWindow.innerHTML += `<div class="message-wrapper ai"><div class="message" style="color:red">Error! Please check connection.</div></div>`;
            }
            scrollToBottom();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
